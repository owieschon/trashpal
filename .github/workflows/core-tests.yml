name: Core tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core contract suite
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      TEST_DATABASE_URL: postgresql://trashpal:trashpal_local_only@127.0.0.1:54329/trashpal_core_test
      POSTGRES_REQUIRE_REAL: "1"
      VROOM_REQUIRE_REAL: "1"
      VROOM_URL: http://127.0.0.1:3000/
    services:
      postgres:
        image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: trashpal_core_test
          POSTGRES_USER: trashpal
          POSTGRES_PASSWORD: trashpal_local_only
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U trashpal -d trashpal_core_test"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
          --health-start-period 10s
      vroom:
        image: vroomvrp/vroom-docker:v1.13.0@sha256:2e417553320bf68a25f6614ba8bdc31b0b2fc1172f8c25518c4656f488031c2a
        env:
          VROOM_ROUTER: osrm
        ports:
          - 3000:3000
        options: >-
          --health-cmd "curl --fail --silent http://127.0.0.1:3000/health"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
          --health-start-period 10s

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js 22.23.1
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.23.1

      - name: Enable Corepack
        run: corepack enable

      - name: Install pinned workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run the repository quality gate
        run: pnpm check

      - name: Run composed API tests against provided local services
        env:
          TRASHPAL_COMPOSED_TEST_SERVICES: provided
        run: pnpm test:composed

  endor:
    name: Endor Labs security scan
    if: >-
      vars.ENDOR_NAMESPACE != '' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Scan source and dependencies with Endor Labs
        uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}
          enable_github_action_token: true
          scan_dependencies: true
          scan_secrets: true
          scan_sast: true
          pr: ${{ github.event_name == 'pull_request' }}
          scan_summary_output_type: table
