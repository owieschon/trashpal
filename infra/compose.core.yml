name: trashpal-core

services:
  postgres:
    image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    user: "70:70"
    environment:
      POSTGRES_DB: trashpal_core_test
      POSTGRES_USER: trashpal
      POSTGRES_PASSWORD: trashpal_local_only
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:54329:5432"
    tmpfs:
      - /var/lib/postgresql/data:uid=70,gid=70,mode=0700
      - /var/run/postgresql:uid=70,gid=70,mode=0775
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trashpal -d trashpal_core_test"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"

  vroom:
    image: vroomvrp/vroom-docker:v1.13.0@sha256:2e417553320bf68a25f6614ba8bdc31b0b2fc1172f8c25518c4656f488031c2a
    environment:
      VROOM_ROUTER: osrm
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:3000/health"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"
